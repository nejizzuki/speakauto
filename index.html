<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpeakAuto</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>🗣️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&family=Poppins:wght@300;400;500;600;700" rel="stylesheet">
<script>if(localStorage.getItem('nostalgia')==='1')document.documentElement.classList.add('nostalgia-mode');</script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2d3149;
  --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--radius:12px
}
body{font-family:'Inter',sans-serif;background:linear-gradient(rgba(15,17,23,.82),rgba(15,17,23,.82)),url('https://cdn.jsdelivr.net/gh/nejizzuki/speakauto@main/madaraeu.png') center/cover no-repeat fixed;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.logo{font-size:2.4rem;margin-bottom:6px}
h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:.85rem;color:var(--muted);margin-top:4px;margin-bottom:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:440px}
label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;padding:10px 14px;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:#475569}
.field{margin-bottom:14px}
details summary{font-size:.78rem;color:var(--muted);cursor:pointer;margin-bottom:10px;user-select:none}
details summary:hover{color:var(--text)}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.divider{height:1px;background:var(--border);margin:20px 0}
#status-box{display:none;margin-top:20px}
.progress-wrap{background:var(--surface2);border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:6px;width:0%;transition:width .5s}
.progress-label{font-size:.8rem;color:var(--muted);margin-bottom:6px}
.log-box{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px 14px;height:220px;overflow-y:auto;font-family:'Consolas','Courier New',monospace;font-size:.76rem;line-height:1.7;color:#94a3b8;white-space:pre-wrap;word-break:break-all}
.log-box .ok{color:var(--green)}
.log-box .err{color:var(--red)}
.log-box .warn{color:var(--yellow)}
.alert{border-radius:8px;padding:10px 14px;font-size:.82rem;margin-top:12px}
.alert-err{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5}
.alert-ok{background:#052e16;border:1px solid #14532d;color:#86efac}
.result-grid{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:1.8rem;font-weight:700}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:2px}
.stat-ok .stat-num{color:var(--green)}
.stat-err .stat-num{color:var(--red)}
footer{margin-top:28px;font-size:.73rem;color:#334155;text-align:center}
</style>


<style>
    button, [onclick], a, label, [role=button] { -webkit-user-select: none; user-select: none; }
    
    /* ═══════════════════════════════════════
       NOSTALGIA MODE — doritus.mmrcoss.tech (2024)
       ═══════════════════════════════════════ */
    @keyframes nostalgia-gradient {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes nostalgia-pulse {
      0%,100% { opacity: 1; } 50% { opacity: .35; }
    }
    @keyframes nostalgia-flicker {
      0%,94%,98%,100% { opacity: 1; }
      95% { opacity: .85; } 96% { opacity: .55; } 97% { opacity: .9; }
    }
    html.nostalgia-mode {
      --bg:#000;--bg2:#0a0a0a;--surface:#111;--surface2:#181818;
      --card:#111;--card2:#181818;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
      --accent:orange;--accent2:#f0f;--accent3:#cc7700;--accent-hover:#cc7700;
      --accent-glow:rgba(255,120,0,.2);--text:#c9c9c9;--text2:#888;--muted:#555;--glow:rgba(255,120,0,.2);
    }
    html.nostalgia-mode body {
      background:#000 !important; color:#c9c9c9 !important;
      font-family:"Poppins",sans-serif !important;
    }
    html.nostalgia-mode body::before {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
      pointer-events:none; z-index:99999; animation:nostalgia-flicker 10s infinite;
    }
    html.nostalgia-mode .aurora,
    html.nostalgia-mode [class*="blob"],
    html.nostalgia-mode [class*="aurora"] { display:none !important; }
    html.nostalgia-mode h1, html.nostalgia-mode h2, html.nostalgia-mode h3 {
      background:linear-gradient(90deg,orange,#f0f) !important;
      -webkit-background-clip:text !important; -webkit-text-fill-color:transparent !important;
      background-clip:text !important; background-size:200% auto !important;
      animation:nostalgia-gradient 5s ease infinite !important;
    }
    html.nostalgia-mode .btn:not(.nostalgia-toggle),
    html.nostalgia-mode .btn-primary:not(.nostalgia-toggle),
    html.nostalgia-mode .btn-accent:not(.nostalgia-toggle),
    html.nostalgia-mode .btn-drag:not(.nostalgia-toggle),
    html.nostalgia-mode .btn-copy:not(.nostalgia-toggle),
    html.nostalgia-mode button:not(.nostalgia-toggle) {
      background:#2c2c2c !important; color:#c9c9c9 !important;
      border:1px solid rgba(255,255,255,.14) !important; box-shadow:none !important;
    }
    html.nostalgia-mode .btn:not(.nostalgia-toggle):hover,
    html.nostalgia-mode .btn-primary:not(.nostalgia-toggle):hover,
    html.nostalgia-mode button:not(.nostalgia-toggle):hover {
      background:#4d4d4d !important; transform:none !important; box-shadow:none !important;
    }
    html.nostalgia-mode input, html.nostalgia-mode textarea, html.nostalgia-mode select {
      background:transparent !important; border:1px solid rgba(255,255,255,.3) !important; color:#c9c9c9 !important;
    }
    html.nostalgia-mode [class*="card"] {
      background:#111 !important; border-color:rgba(255,255,255,.08) !important; box-shadow:none !important;
    }
    html.nostalgia-mode [class*="card"]:hover { border-color:rgba(255,120,0,.3) !important; }
    html.nostalgia-mode header, html.nostalgia-mode nav, html.nostalgia-mode .navbar {
      background:rgba(0,0,0,.92) !important; border-bottom:1px solid rgba(255,255,255,.07) !important;
    }
    html.nostalgia-mode a:not(.nostalgia-toggle) { color:#cc7700 !important; }
    .nostalgia-toggle {
      position:fixed; bottom:18px; left:18px; z-index:9990;
      background:rgba(8,8,8,.92); border:1px solid rgba(255,255,255,.12); color:#555;
      font-size:10px; font-family:monospace; padding:5px 10px 5px 8px;
      border-radius:6px; cursor:pointer; user-select:none; -webkit-user-select:none;
      transition:all .2s; display:flex; align-items:center; gap:6px;
      letter-spacing:.8px; text-transform:uppercase;
    }
    .nostalgia-toggle:hover { border-color:rgba(255,140,0,.35); color:#888; }
    html.nostalgia-mode .nostalgia-toggle {
      border-color:rgba(255,100,0,.5); color:orange;
      text-shadow:0 0 10px rgba(255,100,0,.45); background:rgba(255,60,0,.07);
    }
    .nostalgia-toggle .nt-dot {
      width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0;
    }
    html.nostalgia-mode .nostalgia-toggle .nt-dot {
      animation:nostalgia-pulse 1.4s ease infinite; box-shadow:0 0 5px rgba(255,100,0,.7);
    }
</style>
</head>
<body>

<div class="logo">🗣️</div>
<h1>SpeakAuto</h1>
<p class="subtitle">Complete todas as lições do Speaky via Sala do Futuro</p>

<div class="card">
  <div class="field">
    <label>RA (número do aluno)</label>
    <input id="ra" type="text" placeholder="ex: 1090766099sp" autocomplete="username">
  </div>
  <div class="field">
    <label>Senha SED</label>
    <input id="senha" type="password" placeholder="sua senha do Sala do Futuro" autocomplete="current-password">
  </div>

  <details>
    <summary>⚙️ Chave CapSolver (opcional — para resolver captchas)</summary>
    <div class="field" style="margin-top:8px">
      <label>CapSolver API Key</label>
      <input id="capkey" type="text" placeholder="CAP-xxxxxxxxxxxxxxxx">
    </div>
  </details>

  <div id="alert-box"></div>

  <button class="btn btn-primary" id="btn" onclick="iniciar()">🚀 Fazer Tudo no Speaky</button>

  <div id="status-box">
    <div class="divider"></div>
    <div class="progress-label" id="prog-label">Conectando...</div>
    <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="log-box" id="log-box"></div>
    <div class="result-grid" id="result-grid" style="display:none"></div>
  </div>
</div>

<footer>Ferramenta gratuita para uso pessoal</footer>

<script>
var WORKER = 'https://profissional.nejizzuki.xyz'
var _jobId = null
var _poll = null
var _lastLogLen = 0

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function showAlert(msg, type){
  document.getElementById('alert-box').innerHTML =
    '<div class="alert alert-'+type+'">' + esc(msg) + '</div>'
}
function clearAlert(){ document.getElementById('alert-box').innerHTML = '' }

function setProgress(pct, label){
  document.getElementById('prog-bar').style.width = Math.min(100,pct) + '%'
  if(label) document.getElementById('prog-label').textContent = label
}

function appendLog(lines){
  var box = document.getElementById('log-box')
  lines.forEach(function(line){
    var cls = ''
    var l = line.toLowerCase()
    if(l.includes('erro') || l.includes('error') || l.includes('falhou') || l.includes('fail')) cls = 'err'
    else if(l.includes('ok') || l.includes('concluído') || l.includes('done') || l.includes('✓') || l.includes('lição')) cls = 'ok'
    else if(l.includes('aviso') || l.includes('warn') || l.includes('captcha')) cls = 'warn'
    box.innerHTML += '<span class="'+cls+'">' + esc(line) + '\n</span>'
  })
  box.scrollTop = box.scrollHeight
}

function showResult(res){
  var grid = document.getElementById('result-grid')
  var done = res.lessons_done || res.done || 0
  var errs = res.lessons_error || res.errors || 0
  grid.style.display = 'grid'
  grid.innerHTML =
    '<div class="stat-box stat-ok"><div class="stat-num">'+done+'</div><div class="stat-lbl">lições feitas</div></div>' +
    '<div class="stat-box stat-err"><div class="stat-num">'+errs+'</div><div class="stat-lbl">erros</div></div>'
}

async function iniciar(){
  clearAlert()
  var ra = document.getElementById('ra').value.trim()
  var senha = document.getElementById('senha').value
  var capKey = document.getElementById('capkey').value.trim()

  if(!ra || ra.length < 4){ showAlert('Informe o RA (ex: 1090766099sp).','err'); return }
  if(!/\d/.test(ra)){ showAlert('RA inválido.','err'); return }
  if(!senha){ showAlert('Informe a senha.','err'); return }

  var btn = document.getElementById('btn')
  btn.disabled = true
  btn.textContent = '⏳ Rodando...'
  document.getElementById('status-box').style.display = 'block'
  document.getElementById('result-grid').style.display = 'none'
  document.getElementById('log-box').innerHTML = ''
  _lastLogLen = 0
  setProgress(5, 'Conectando ao servidor...')

  try {
    var body = {ra: ra, senha: senha}
    if(capKey) body.cap_key = capKey

    var r = await fetch(WORKER + '/sp/portal/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    })
    var d = await r.json().catch(function(){return {}})

    if(!r.ok || d.error || d.erro){
      showAlert(d.error || d.erro || 'Erro HTTP ' + r.status, 'err')
      reset(); return
    }

    _jobId = d.job_id
    appendLog(['Job iniciado: ' + _jobId.slice(0,8) + '...'])
    setProgress(10, 'Iniciando browser...')
    startPoll()
  } catch(e){
    showAlert('Erro de conexão: ' + e.message, 'err')
    reset()
  }
}

function startPoll(){
  if(_poll) clearInterval(_poll)
  var ticks = 0
  _poll = setInterval(async function(){
    ticks++
    if(ticks > 180){ // 15min max
      clearInterval(_poll)
      appendLog(['[timeout] Processo demorou demais.'])
      reset(); return
    }
    try {
      var r = await fetch(WORKER + '/sp/portal/status/' + _jobId)
      var d = await r.json().catch(function(){return {}})
      if(!r.ok) return

      // append new log lines
      var logs = d.log || []
      if(logs.length > _lastLogLen){
        appendLog(logs.slice(_lastLogLen))
        _lastLogLen = logs.length
      }

      var status = d.status || ''
      var pct = status === 'running' ? Math.min(90, 10 + ticks * 0.5) : 100

      if(status === 'running'){
        setProgress(pct, 'Fazendo lições...')
      } else if(status === 'done'){
        clearInterval(_poll)
        setProgress(100, 'Concluído! ✔')
        var res = d.result || {}
        if(res.ok || (res.lessons_done > 0)){
          showAlert('Tudo certo! ' + (res.lessons_done || 0) + ' lições concluídas.', 'ok')
          showResult(res)
        } else {
          showAlert(res.error || 'Concluído com erros. Veja o log.', 'err')
          showResult(res)
        }
        reset()
      } else if(status === 'error'){
        clearInterval(_poll)
        setProgress(100, 'Erro')
        var res = d.result || {}
        showAlert(res.error || 'Erro no processo. Veja o log.', 'err')
        showResult(res)
        reset()
      }
    } catch(e){}
  }, 4000)
}

function reset(){
  var btn = document.getElementById('btn')
  btn.disabled = false
  btn.textContent = '🚀 Fazer Tudo no Speaky'
}
</script>

  <button class="nostalgia-toggle" id="nostalgia-toggle" onclick="toggleNostalgia()" title="Modo Nostalgia (doritus 2024)">
    <span class="nt-dot"></span><span>Nostalgia</span>
  </button>
  <script>function toggleNostalgia(){var on=document.documentElement.classList.toggle('nostalgia-mode');localStorage.setItem('nostalgia',on?'1':'0');}</script>
</body>
</html>
